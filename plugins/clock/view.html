<!doctype html><html><head><meta charset="utf-8"><title>Clock</title>
<style>
 html,body{margin:0;height:100%;background:#0e0e10;color:#e4e4e7;overflow:hidden;
   font-family:system-ui,Segoe UI,Arial,sans-serif}

 /* ── layout ── */
 #wrap{height:100%;display:flex;flex-direction:column;
   align-items:center;justify-content:center;gap:.3em}
 body[data-ctx="main"] #wrap{justify-content:flex-start;align-items:flex-start;
   padding:4vh 5vw;gap:.35em}

 /* ── clock — amber instrument glow, tabular numerals ── */
 #t{font-size:7vw;font-weight:700;line-height:1;
   color:#e8c870;font-variant-numeric:tabular-nums;letter-spacing:-0.03em}
 body[data-ctx="main"] #t{font-size:12vw}

 /* ── date ── */
 #d{font-size:2.2vw;opacity:.45;letter-spacing:.18em;text-transform:uppercase;
   font-weight:400;margin-top:.05em}
 body[data-ctx="main"] #d{font-size:1.6vw}

 /* thin amber rule below date in main */
 body[data-ctx="main"] #d::after{content:"";display:block;
   height:1px;background:rgba(232,164,74,.22);margin-top:.55em;width:50vw}

 /* ── weather row ── */
 .wx{display:flex;align-items:center;gap:.45em;font-size:3vw;
   font-weight:500;opacity:.92;margin-top:.15em}
 body[data-ctx="main"] .wx{font-size:3.2vw}
 .wx-hilo{font-size:.75em;opacity:.55;letter-spacing:.02em}

 /* ── 3-day forecast strip ── */
 .fc{display:flex;gap:.55em;margin-top:.3em}
 .fc-item{display:flex;flex-direction:column;align-items:center;gap:.1em;
   border:1px solid rgba(228,228,231,.12);border-radius:3px;
   padding:.25em .6em;min-width:3.8em;text-align:center}
 .fc-day{font-size:1.2vw;letter-spacing:.1em;text-transform:uppercase;opacity:.45}
 .fc-ico{font-size:1.4vw}
 .fc-hi{font-size:1.3vw;font-weight:600;opacity:.85}

 /* ── news list ── */
 .news{align-self:stretch;overflow:hidden;margin-top:.5em;
   border-top:1px solid rgba(228,228,231,.1);padding-top:.4em}
 .news h4{font-size:1.15vw;letter-spacing:.15em;text-transform:uppercase;
   opacity:.3;font-weight:500;margin:.05em 0 .35em}
 .ni{font-size:1.5vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
   padding:.18em 0 .18em .5em;border-left:2px solid rgba(232,164,74,.32);
   margin-bottom:.22em;line-height:1.3}
 .ni .src{opacity:.38;font-size:.82em}

 /* hide forecast + news outside main */
 body:not([data-ctx="main"]) .fc,
 body:not([data-ctx="main"]) .news{display:none}
</style></head><body>
<div id="wrap">
  <div id="t">--:--</div>
  <div id="d"></div>
  <div class="wx" id="wx"></div>
  <div class="fc" id="fc"></div>
  <div class="news" id="news"></div>
</div>
<script>
const ctx=new URLSearchParams(location.search).get("ctx")||"tile";
document.body.dataset.ctx=ctx;

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function tick(){const n=new Date();
  document.getElementById("t").textContent=n.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  document.getElementById("d").textContent=n.toLocaleDateString([],{weekday:"short",day:"numeric",month:"short"});}
tick(); setInterval(tick,1000);

function renderWx(w){
  const wx=document.getElementById("wx"),fc=document.getElementById("fc");
  if(!w){wx.textContent="";fc.textContent="";return;}
  wx.innerHTML=esc(w.emoji)+" "+w.temp+w.units+" "+esc(w.location_name)+
    ' <span class="wx-hilo">↑'+w.today.hi+"° ↓"+w.today.lo+"°</span>";
  fc.innerHTML=(w.forecast||[]).map(f=>
    '<span class="fc-item"><span class="fc-day">'+esc(f.day)+'</span>'+
    '<span class="fc-ico">'+esc(f.emoji)+'</span>'+
    '<span class="fc-hi">'+f.hi+"°</span></span>").join("");
}

function renderNews(items){
  const el=document.getElementById("news");
  if(ctx!=="main"){el.innerHTML="";return;}
  if(!items||!items.length){el.innerHTML='<h4>News</h4><div class="ni" style="opacity:.4">No news</div>';return;}
  el.innerHTML='<h4>News</h4>'+items.map(i=>
    '<div class="ni">'+esc(i.title)+' <span class="src">('+esc(i.source)+')</span></div>').join("");
}

async function load(){
  try{const d=await (await fetch("/plugin/clock/data")).json();
    renderWx(d.weather); renderNews(d.news);
  }catch(e){renderWx(null); renderNews([]);}
}
load(); setInterval(load,5*60*1000);
</script></body></html>
