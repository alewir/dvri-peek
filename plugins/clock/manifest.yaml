id: clock
name: "Clock"
refresh_seconds: 900        # weather + news cache TTL (the clock itself is live frontend)
contexts: [tile, main, filler]
# config (in secrets.local.yaml -> plugins.clock):
#   location: "Warsaw"        city or "lat,lon" — weather + local-news query
#   news_locale: "pl-PL"      lang-region for the derived local-news feed
#   news_feeds: [ <rss urls> ] merged with the derived local feed
#   max_news: 10
config: [location, news_locale, news_feeds, max_news]
