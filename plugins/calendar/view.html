<!doctype html><html><head><meta charset="utf-8"><title>Calendar</title>
<style>
 /* ── base ─────────────────────────────────────────── */
 *{box-sizing:border-box}
 html,body{margin:0;height:100%;background:#0e0e10;color:#e4e4e7;overflow:hidden;
   font-family:system-ui,Segoe UI,Arial,sans-serif;font-variant-numeric:tabular-nums}
 #wrap{height:100%;display:flex;flex-direction:column}

 /* ── agenda (tile / filler) ───────────────────────── */
 /* overflow:hidden (not auto): the small preview shows a fixed few items that fit the
    tile, so there is no scrollbar to fight the parent .clickcatch click-to-promote
    overlay. The big month/week view (#cal-body) keeps its own scrolling. */
 .agenda{height:100%;overflow:hidden;padding:5px 0}
 .ev{display:flex;align-items:center;gap:0;padding:4px 10px;
   border-bottom:1px solid #ffffff0d}
 /* colored dot — inline-block so it renders inside chips too */
 .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
   flex:0 0 7px;vertical-align:middle;margin-right:8px}
 /* timestamp rail: hairline divider between date and title */
 .when{font-size:11px;opacity:.5;white-space:nowrap;font-variant-numeric:tabular-nums;
   padding-right:10px;margin-right:10px;border-right:1px solid #ffffff18;flex:0 0 auto}
 .title{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
 .err{color:#fca5a5;padding:8px;font-size:12px}

 /* ── controls bar (main ctx only) ────────────────── */
 #cal-controls{display:none;flex:0 0 auto;align-items:center;gap:6px;
   padding:5px 10px;border-bottom:1px solid #ffffff0f}
 body[data-ctx="main"] #cal-controls{display:flex}
 #cal-controls button{
   background:transparent;border:1px solid #ffffff1c;color:#a1a1aa;
   border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px;
   letter-spacing:.02em;transition:color .12s,border-color .12s}
 #cal-controls button:hover:not(:disabled){color:#e4e4e7;border-color:#ffffff38}
 #cal-controls button:disabled{opacity:.22;cursor:default}
 /* month/year label — flex:1 so it fills the gap between nav cluster and mode btn */
 #cal-label{font-size:13px;font-weight:600;letter-spacing:.05em;color:#e4e4e7;
   flex:1;text-align:center}
 #cal-mode{flex:none}

 /* ── calendar body ────────────────────────────────── */
 #cal-body{flex:1 1 auto;min-height:0;overflow:hidden}
 body:not([data-ctx="main"]) #cal-body{display:none}
 /* agenda hidden in main ctx — cal-body fills wrap instead */
 body[data-ctx="main"] .agenda{display:none}

 /* ── month grid ───────────────────────────────────── */
 /* flex column of one header row + six week rows */
 .cal-month{display:flex;flex-direction:column;height:100%}
 /* day-of-week header — own 7-col grid, column-aligned with the week rows */
 .cal-dowrow{display:grid;grid-template-columns:repeat(7,1fr);
   flex:0 0 auto;border-bottom:1px solid #ffffff1c}
 .cal-dow{font-size:10px;letter-spacing:.08em;text-transform:uppercase;
   color:#6b7280;padding:3px 6px}
 /* one row per week — positioning context for its absolute span overlay */
 .cal-weekrow{position:relative;flex:1 1 0;min-height:0;overflow:hidden;
   display:grid;grid-template-columns:repeat(7,1fr)}
 /* day cell — grid item: date number, reserved span gap, then timed chips */
 .cal-cell{position:relative;padding:2px 3px;overflow:hidden;min-height:0;
   display:flex;flex-direction:column;
   border-right:1px solid #ffffff10;border-bottom:1px solid #ffffff10}
 .cal-cell.dim .cal-date{opacity:.25;font-weight:400}
 .cal-cell.dim .chip{opacity:.4}
 /* today — slow breathing glow (the signature element); inset so the
    weekrow overflow:hidden never clips it */
 @keyframes today-pulse{
   0%,100%{box-shadow:inset 0 0 0 1px #2563eb,inset 0 0 6px #2563eb24}
   50%    {box-shadow:inset 0 0 0 1px #3b82f6,inset 0 0 14px #3b82f644}
 }
 .cal-cell.today{animation:today-pulse 4s ease-in-out infinite}
 .cal-cell.today .cal-date{color:#60a5fa;font-weight:700}
 @media(prefers-reduced-motion:reduce){
   .cal-cell.today{animation:none;box-shadow:inset 0 0 0 1px #2563eb}
 }
 /* day number — fixed height so the span overlay aligns directly below it */
 .cal-date{font-size:12px;font-weight:600;line-height:16px;height:16px;
   color:#c4c4c8;flex:0 0 auto}
 /* in-flow spacer reserving vertical room for the absolute span overlay,
    so timed chips never collide with spanning bars */
 .cal-spanspace{flex:0 0 auto}
 /* span overlay — its OWN 7-col grid; bars are grid items here, which is
    what lets grid-column actually span columns (the prior bug) */
 .cal-spanlayer{position:absolute;left:0;right:0;top:var(--date-h);
   display:grid;grid-template-columns:repeat(7,1fr);
   grid-auto-rows:var(--bar-h);column-gap:0;row-gap:var(--bar-gap);
   pointer-events:none}
 /* spanning bars (multi-day / all-day) — grid items of the overlay */
 .spanbar{font-size:10px;font-weight:600;border-radius:3px;padding:0 6px;
   margin:0 1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
   height:var(--bar-h);line-height:var(--bar-h);
   box-shadow:0 1px 2px #00000040}
 /* event chips (timed single-day) */
 .chip{font-size:10px;font-weight:500;border-radius:3px;padding:1px 4px;
   margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
   line-height:14px}
 .chip .dot{width:5px;height:5px;flex:0 0 5px;margin-right:3px}
 /* overflow label */
 .more{font-size:9px;opacity:.4;margin-top:1px;padding-left:2px}

 /* ── week view ────────────────────────────────────── */
 .cal-week{display:flex;flex-direction:column;height:100%}
 /* all-day band: 48px label column + 7 equal day columns */
 .cal-allday{display:grid;grid-template-columns:48px repeat(7,1fr);
   border-bottom:1px solid #ffffff20;min-height:24px;padding-bottom:2px}
 .cal-allday .lbl{font-size:10px;opacity:.5;padding:4px 3px;letter-spacing:.04em}
 /* all-day spanning bars are grid items of .cal-allday — gridColumn works because
    .cal-allday is display:grid (same lesson as Month view span overlay) */
 .cal-allday .spanbar{font-size:10px;font-weight:600;border-radius:3px;padding:0 5px;
   margin:2px 1px 0;height:16px;line-height:16px;color:#fff;
   white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
   box-shadow:0 1px 2px #00000040;align-self:start}
 /* hourly scroll area */
 .cal-hours{flex:1 1 auto;overflow:auto;display:grid;
   grid-template-columns:48px repeat(7,1fr);position:relative}
 /* hour labels — flat #6b7280 matches .cal-dow exactly; no opacity layer */
 .hourlab{font-size:10px;color:#6b7280;height:40px;border-top:1px solid #ffffff10;
   padding:1px 4px;letter-spacing:.01em}
 .daycol{position:relative;border-left:1px solid #ffffff10}
 .hcell{height:40px;border-top:1px solid #ffffff10}
 /* today column — soft blue wash + top accent cap-line echoing Month cell's inset border */
 .daycol.today{background:#2563eb14;border-top:1px solid #3b82f666}
 /* timed event blocks — absolutely positioned within their .daycol */
 .tblock{position:absolute;left:2px;right:2px;border-radius:4px;color:#fff;
   font-size:10px;font-weight:500;padding:1px 4px;overflow:hidden;
   box-shadow:0 1px 3px #00000050;line-height:13px;white-space:nowrap;cursor:default}
 /* week column day-header row */
 .cal-week-header{display:grid;grid-template-columns:48px repeat(7,1fr);
   flex:0 0 auto;border-bottom:1px solid #ffffff1c}
 .cal-week-header .wh-lbl{width:48px}
 .whdcol{font-size:10px;letter-spacing:.08em;text-transform:uppercase;
   color:#6b7280;padding:3px 4px;text-align:center}
 .whdcol.today{color:#60a5fa;font-weight:700}
</style></head><body>
<div id="wrap">
  <div id="cal-controls">
    <button id="cal-prev">‹</button><button id="cal-today">Today</button>
    <button id="cal-next">›</button><span id="cal-label"></span>
    <button id="cal-mode">Week</button>
  </div>
  <div class="agenda" id="agenda">…</div>
  <div id="cal-body"></div>
</div>
<script>
const ctx=new URLSearchParams(location.search).get("ctx")||"tile";
document.body.dataset.ctx=ctx;
const MS_DAY=86400000;
// span-bar geometry (px) — single source; pushed to CSS as custom props so the
// in-flow chip spacer and the absolute span overlay stay pixel-aligned.
const BAR_H=15, BAR_GAP=2, DATE_H=18;   // DATE_H = cell padding-top(2) + date height(16)
let EVENTS=[], NOW=new Date(), WIN0=null, WIN1=null;   // WIN0/WIN1 = fetched window bounds
let MODE=localStorage.getItem("cal.viewmode")||"month";
// init the visible period to TODAY's month/week per the persisted mode (not the 1st of the month)
let CUR=MODE==="week"?startOfWeek(new Date()):startOfMonth(new Date());

function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}
function startOfWeek(d){const x=new Date(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
function sameDay(a,b){return a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();}
// LOCAL calendar-day index. getTime() is UTC; subtracting the date's own tz offset
// yields wall-clock ms, so all-day (local-midnight) and timed events on the same
// local date bucket identically and align with the local-midnight-stepped grid.
// (Plain floor(getTime()/MS_DAY) is UTC-bucketed and misplaces timed events by a
//  day in any timezone east of UTC — the grid is built on local dates.)
function dnum(d){return Math.floor((d.getTime()-d.getTimezoneOffset()*60000)/MS_DAY);}
// HTML-encode for safe interpolation into innerHTML strings. Use ONLY when building
// innerHTML; NEVER for textContent / DOM-property assignments (which don't parse HTML).
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtTime(e){if(e.allday)return"all day";return new Date(e.start).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});}
// Route errors to whichever container is visible for this ctx (#agenda is hidden in main).
function showErr(msg){const t=ctx==="main"?document.getElementById("cal-body"):document.getElementById("agenda");
  t.innerHTML='<div class="err">'+esc(msg)+'</div>';}

// pure helpers (also asserted present by the markup test)
function splitSpanByWeek(startIdx,endIdxExcl,weekStartIdx){
  // returns [{row, col0, col1}] segments clipped to weeks starting at weekStartIdx
  const out=[];
  let s=startIdx;
  while(s<endIdxExcl){
    const row=Math.floor((s-weekStartIdx)/7);
    const weekEnd=weekStartIdx+(row+1)*7;       // exclusive
    const segEnd=Math.min(endIdxExcl,weekEnd);
    out.push({row, col0:(s-weekStartIdx)-row*7, col1:(segEnd-1-weekStartIdx)-row*7});
    s=segEnd;
  }
  return out;
}
function assignLanes(items){
  // items: [{s,e}] day-index ranges (e exclusive). returns lane per item (greedy).
  const lanes=[]; const res=new Array(items.length);
  const order=items.map((it,i)=>i).sort((a,b)=>items[a].s-items[b].s||items[a].e-items[b].e);
  for(const i of order){
    let placed=-1;
    for(let L=0;L<lanes.length;L++){ if(lanes[L]<=items[i].s){placed=L;break;} }
    if(placed<0){placed=lanes.length;lanes.push(0);}
    lanes[placed]=items[i].e; res[i]=placed;
  }
  return res;
}

async function load(){
  try{
    const d=await (await fetch("/plugin/calendar/data")).json();
    if(d.error){showErr(d.error);return;}
    EVENTS=(d.events||[]).filter(e=>e&&e.start);
    if(!EVENTS.length && d.errors){showErr("calendar feeds unavailable");return;}
    if(EVENTS.length){WIN0=new Date(EVENTS[0].start);WIN1=new Date(EVENTS[EVENTS.length-1].start);}
    render();
  }catch(e){showErr("calendar offline");}
}

function render(){
  NOW=new Date();                 // refresh so today-highlight + agenda "upcoming" roll over at midnight
  if(ctx!=="main"){renderAgenda();return;}
  document.getElementById("cal-mode").textContent = MODE==="month"?"Week":"Month";
  if(MODE==="month") renderMonth(); else renderWeek();   // renderWeek added in Task 4
}

function renderAgenda(){
  // small preview: a fixed few upcoming items that FIT the tile (no scrollbar — the tile
  // is clickable end-to-end to promote it; the big month/week view shows everything)
  const max=5, up=EVENTS.filter(e=>new Date(e.end||e.start)>=NOW).slice(0,max);
  const a=document.getElementById("agenda");
  if(!up.length){a.innerHTML='<div class="err" style="opacity:.6">No upcoming events</div>';return;}
  a.innerHTML=up.map(e=>{
    const dk=new Date(e.start).toLocaleDateString([], {weekday:"short",day:"numeric",month:"short"});
    return '<div class="ev"><span class="dot" style="background:'+esc(e.color)+'"></span>'+
      '<span class="when">'+dk+' '+fmtTime(e)+'</span><span class="title">'+esc(e.title)+'</span></div>';
  }).join("");
}

function renderMonth(){
  const body=document.getElementById("cal-body");
  const first=startOfMonth(CUR), gridStart=startOfWeek(first);
  const weekStartIdx=dnum(gridStart), gridEndIdx=weekStartIdx+42;   // exclusive
  document.getElementById("cal-label").textContent=CUR.toLocaleDateString([], {month:"long",year:"numeric"});
  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  // spanning events: all-day OR timed multi-day. Coverage is an EXCLUSIVE day-index
  // range [s, eExcl): all-day end is already exclusive; timed end is inclusive → +1.
  const spans=EVENTS.filter(e=>e.allday || (dnum(new Date(e.end||e.start))>dnum(new Date(e.start))))
    .map(e=>{const s=dnum(new Date(e.start));
            let eend=dnum(new Date(e.end||e.start)); if(!e.allday) eend+=1;   // end-less → single day
            return {e,s,eExcl:eend};})
    .filter(x=>x.eExcl>weekStartIdx && x.s<gridEndIdx);
  // Global lane assignment (clamped to the visible window) so a multi-week event
  // keeps ONE vertical lane across the week rows it spans.
  const laneOf=assignLanes(spans.map(x=>({s:Math.max(x.s,weekStartIdx),e:Math.min(x.eExcl,gridEndIdx)})));
  // Bucket span segments per week row via splitSpanByWeek.
  const weekSegs=[[],[],[],[],[],[]];
  spans.forEach((x,i)=>{
    const cs=Math.max(x.s,weekStartIdx), ce=Math.min(x.eExcl,gridEndIdx);
    for(const seg of splitSpanByWeek(cs,ce,weekStartIdx)) weekSegs[seg.row].push({...seg,lane:laneOf[i],e:x.e});
  });
  const weekMaxLane=weekSegs.map(segs=>segs.reduce((m,s)=>Math.max(m,s.lane),-1));

  // timed single-day events bucketed by grid day index
  const byCell={};
  EVENTS.filter(e=>!e.allday && dnum(new Date(e.end||e.start))===dnum(new Date(e.start))).forEach(e=>{
    const idx=dnum(new Date(e.start))-weekStartIdx; if(idx<0||idx>=42)return;
    (byCell[idx]=byCell[idx]||[]).push(e);
  });

  const month=document.createElement("div"); month.className="cal-month";
  month.style.setProperty("--bar-h",BAR_H+"px");
  month.style.setProperty("--bar-gap",BAR_GAP+"px");
  month.style.setProperty("--date-h",DATE_H+"px");
  const dowRow=document.createElement("div"); dowRow.className="cal-dowrow";
  dows.forEach(n=>{const c=document.createElement("div");c.className="cal-dow";c.textContent=n;dowRow.appendChild(c);});
  month.appendChild(dowRow);

  for(let w=0;w<6;w++){
    const row=document.createElement("div"); row.className="cal-weekrow";
    const reservedH=(weekMaxLane[w]+1)*(BAR_H+BAR_GAP);   // 0 when this week has no spans
    for(let c=0;c<7;c++){
      const idx=w*7+c, d=new Date(gridStart.getTime()+idx*MS_DAY);
      const cell=document.createElement("div");
      cell.className="cal-cell"+(d.getMonth()!=CUR.getMonth()?" dim":"")+(sameDay(d,NOW)?" today":"");
      cell.dataset.idx=idx;
      const dn=document.createElement("div"); dn.className="cal-date"; dn.textContent=d.getDate(); cell.appendChild(dn);
      if(reservedH>0){const sp=document.createElement("div"); sp.className="cal-spanspace"; sp.style.height=reservedH+"px"; cell.appendChild(sp);}
      const list=byCell[idx];
      if(list){
        list.slice(0,3).forEach(e=>{const ch=document.createElement("div"); ch.className="chip";
          ch.style.background=e.color+"33";
          ch.innerHTML='<span class="dot" style="background:'+esc(e.color)+'"></span> '+fmtTime(e)+' '+esc(e.title);
          cell.appendChild(ch);});
        if(list.length>3){const m=document.createElement("div"); m.className="more"; m.textContent="+"+(list.length-3)+" more"; cell.appendChild(m);}
      }
      row.appendChild(cell);
    }
    if(weekSegs[w].length){
      const layer=document.createElement("div"); layer.className="cal-spanlayer";
      weekSegs[w].forEach(s=>{const bar=document.createElement("div"); bar.className="spanbar";
        bar.style.background=s.e.color;
        bar.style.gridColumn=(s.col0+1)+" / "+(s.col1+2);   // grid item → truly spans columns
        bar.style.gridRow=(s.lane+1);
        bar.textContent=s.e.title;   // textContent doesn't parse HTML — never esc() here
        layer.appendChild(bar);});
      row.appendChild(layer);
    }
    month.appendChild(row);
  }
  body.replaceChildren(month);
  updateNavBounds();
}

function renderWeek(){
  const body=document.getElementById("cal-body");
  const ws=startOfWeek(CUR), wsIdx=dnum(ws);
  const days=[...Array(7)].map((_,i)=>new Date(ws.getTime()+i*MS_DAY));
  document.getElementById("cal-label").textContent=
    days[0].toLocaleDateString([], {day:"numeric",month:"short"})+" – "+
    days[6].toLocaleDateString([], {day:"numeric",month:"short"});
  const HOUR=40;
  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  // build static skeleton via innerHTML
  let html='<div class="cal-week">';
  // day-of-week header row
  html+='<div class="cal-week-header"><div class="wh-lbl"></div>';
  for(let i=0;i<7;i++){
    const tcls=sameDay(days[i],NOW)?" today":"";
    html+='<div class="whdcol'+tcls+'">'+dows[i]+' '+days[i].getDate()+'</div>';
  }
  html+='</div>';
  // all-day band (multi-day/all-day events appended as grid items later)
  html+='<div class="cal-allday"><div class="lbl">all-day</div>';
  // no filler cells: span bars (explicit gridColumn, auto row) lane-stack via
  // grid auto-placement starting at row 1 (fillers would force them to row 2+)
  html+='</div>';
  // hourly scroll area: label column + 7 day columns each with 24 hcells
  html+='<div class="cal-hours"><div>';
  for(let h=0;h<24;h++) html+='<div class="hourlab">'+String(h).padStart(2,"0")+':00</div>';
  html+='</div>';
  for(let i=0;i<7;i++){
    const tcls=sameDay(days[i],NOW)?" today":"";
    html+='<div class="daycol'+tcls+'" data-d="'+i+'">';
    for(let h=0;h<24;h++) html+='<div class="hcell"></div>';
    html+='</div>';
  }
  html+='</div></div>';
  body.innerHTML=html;

  // all-day / multi-day spanning band — bars are grid items of .cal-allday
  // so gridColumn actually spans (display:grid on the band, same pattern as Month overlay)
  const adRow=body.querySelector(".cal-allday");
  EVENTS.filter(e=>e.allday).forEach(e=>{
    const s=dnum(new Date(e.start)), eExcl=dnum(new Date(e.end||e.start));
    const c0=Math.max(s,wsIdx)-wsIdx, c1=Math.min(eExcl,wsIdx+7)-1-wsIdx;
    if(c1<c0||c1<0||c0>6) return;
    const bar=document.createElement("div"); bar.className="spanbar";
    bar.style.background=e.color;
    // +2: column 1 is the label, day columns start at 2
    bar.style.gridColumn=(c0+2)+" / "+(c1+3);
    bar.textContent=e.title;   // textContent — never esc() here
    adRow.appendChild(bar);
  });

  // timed events: absolute within their .daycol, positioned by LOCAL time
  const cols=[...body.querySelectorAll(".cal-hours .daycol")];
  EVENTS.filter(e=>!e.allday).forEach(e=>{
    const st=new Date(e.start);
    const di=dnum(st)-wsIdx;
    if(di<0||di>6) return;
    const en=new Date(e.end||e.start);
    const top=(st.getHours()+st.getMinutes()/60)*HOUR;
    const mins=Math.max(20,(en-st)/60000);
    const hgt=Math.max(14,(mins/60)*HOUR);
    const b=document.createElement("div"); b.className="tblock";
    b.style.top=top+"px"; b.style.height=hgt+"px";
    b.style.background=e.color;
    b.textContent=fmtTime(e)+" "+e.title;   // textContent — never esc() here
    cols[di].appendChild(b);
  });

  updateNavBounds();
  // scroll to ~07:00 so morning events are immediately visible
  const hrs=body.querySelector(".cal-hours"); if(hrs) hrs.scrollTop=7*HOUR;
}

function updateNavBounds(){
  // disable prev/next when stepping would leave the fetched window
  const prev=document.getElementById("cal-prev"), next=document.getElementById("cal-next");
  if(!WIN0||!WIN1){prev.disabled=next.disabled=false;return;}
  const step=(MODE==="month")?{m:1}:{d:7};
  prev.disabled = stepDate(CUR,-1,step) < startOfMonth(WIN0);
  next.disabled = stepDate(CUR, 1,step) > WIN1;
}
function stepDate(base,dir,step){const d=new Date(base);
  if(step.m)d.setMonth(d.getMonth()+dir*step.m); else d.setDate(d.getDate()+dir*step.d); return d;}

// nav + mode wiring
document.getElementById("cal-prev").onclick=()=>{CUR=stepDate(CUR,-1,MODE==="month"?{m:1}:{d:7});render();};
document.getElementById("cal-next").onclick=()=>{CUR=stepDate(CUR, 1,MODE==="month"?{m:1}:{d:7});render();};
document.getElementById("cal-today").onclick=()=>{CUR=MODE==="month"?startOfMonth(new Date()):startOfWeek(new Date());render();};
document.getElementById("cal-mode").onclick=()=>{MODE=MODE==="month"?"week":"month";localStorage.setItem("cal.viewmode",MODE);
  CUR=MODE==="month"?startOfMonth(CUR):startOfWeek(CUR);render();};

load(); setInterval(load,5*60*1000);
</script></body></html>
